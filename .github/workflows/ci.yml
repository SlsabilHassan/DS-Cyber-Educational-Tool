name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # The challenge integrity tests run each challenge's harness under CPython.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Test (unit + 64-challenge integrity suite)
        run: npm test

      - name: Production build
        run: npm run build
